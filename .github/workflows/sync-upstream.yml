name: Sync Upstream

on:
  schedule:
    # Check for upstream updates daily at 6am UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/sysadminsmedia/homebox.git || true

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Check for new commits
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          if [ "$BEHIND" -eq 0 ]; then
            echo "Already up to date with upstream"
          else
            echo "$BEHIND new commits from upstream"
          fi

      - name: Create sync branch and merge
        if: steps.check.outputs.behind != '0'
        run: |
          BRANCH="sync/upstream-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          if git merge upstream/main --no-edit; then
            echo "MERGE_STATUS=clean" >> "$GITHUB_ENV"
          else
            echo "MERGE_STATUS=conflict" >> "$GITHUB_ENV"
            # Commit conflict markers so PR shows what needs resolving
            git add -A
            git commit -m "chore: upstream sync with conflicts (needs manual resolution)"
          fi
          git push origin "$BRANCH"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Create PR (clean merge)
        if: steps.check.outputs.behind != '0' && env.MERGE_STATUS == 'clean'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "chore: sync upstream (${{ steps.check.outputs.behind }} commits)" \
            --body "$(cat <<'BODY'
          ## Upstream Sync

          Merging ${{ steps.check.outputs.behind }} new commits from [sysadminsmedia/homebox](https://github.com/sysadminsmedia/homebox).

          **Merge status:** Clean - no conflicts.

          Auto-generated by the upstream sync workflow.
          BODY
          )" \
            --base main \
            --head "$BRANCH"

      - name: Create PR (with conflicts)
        if: steps.check.outputs.behind != '0' && env.MERGE_STATUS == 'conflict'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "chore: sync upstream (CONFLICTS - needs resolution)" \
            --body "$(cat <<'BODY'
          ## Upstream Sync - Conflicts Detected

          Merging ${{ steps.check.outputs.behind }} new commits from upstream resulted in conflicts.

          **Expected conflict files** (our HBC integration points):
          - `frontend/layouts/default.vue` (sidebar nav)
          - `frontend/pages/item/[id]/index.vue` (dropdown menu)
          - `frontend/locales/en.json` (translations)
          - `frontend/nuxt.config.ts` (runtime config)

          Please resolve conflicts manually, keeping both upstream changes and our HBC additions.
          BODY
          )" \
            --base main \
            --head "$BRANCH" \
            --label "needs-resolution"
